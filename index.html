<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login Page</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: url('campus.jpeg') no-repeat center center fixed;
      background-size: cover;
    }

    .login-container {
      background-color: rgba(255, 255, 255, 0.9); /* semi-transparent box */
      width: 300px;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .login-container h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .login-container input[type="text"],
    .login-container input[type="password"] {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    .login-container label {
      font-size: 14px;
    }

    .login-container button {
      width: 100%;
      padding: 10px;
      background-color: #007BFF;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 10px;
    }

    .login-container button:hover {
      background-color: #0056b3;
    }

    .login-container .forgot {
      text-align: center;
      margin-top: 10px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Already have an account?</h2>
    <form>
      <label for="username">USERNAME</label>
      <input type="text" id="username" name="username">

      <label for="password">PASSWORD</label>
      <input type="password" id="password" name="password">

      <div>
        <input type="checkbox" id="remember" name="remember">
        <label for="remember">remember username</label>
      </div>

      <button type="submit">login</button>
      <div class="forgot">
        <a href="#">Forgotten your username or password?</a>
      </div>
    </form>
  </div>
</body>
</html>
